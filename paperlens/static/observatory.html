<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link rel="stylesheet" href="/static/theme.css"/>
  <link rel="stylesheet" href="/static/base.css"/>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><img src="/static/logo.svg" class="brand-logo" alt=""/>Metalens</a>
    <nav class="nav-shared">
      <a href="/catalog">Data Catalogue</a>
      <a href="/observatory">Examples</a>
    </nav>
    <span class="spacer"></span>
    <nav class="nav-personal">
      <a href="/extract">Process papers</a>
