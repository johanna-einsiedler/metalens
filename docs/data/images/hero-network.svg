<svg width="1600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="400" fill="url(#bg-gradient)"/>

  <!-- Network nodes and connections -->
  <g opacity="0.6">
    <!-- Connections -->
    <line x1="200" y1="150" x2="400" y2="100" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="400" y1="100" x2="600" y2="200" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="600" y1="200" x2="800" y2="150" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="800" y1="150" x2="1000" y2="250" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="1000" y1="250" x2="1200" y2="180" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="200" y1="150" x2="500" y2="280" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="500" y1="280" x2="900" y2="300" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="300" y1="250" x2="700" y2="100" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="700" y1="100" x2="1100" y2="200" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>
    <line x1="400" y1="300" x2="800" y2="250" stroke="#2196f3" stroke-width="1.5" opacity="0.4"/>

    <!-- Nodes -->
    <circle cx="200" cy="150" r="8" fill="#1976d2" opacity="0.7"/>
    <circle cx="400" cy="100" r="10" fill="#1976d2" opacity="0.7"/>
    <circle cx="600" cy="200" r="7" fill="#1976d2" opacity="0.7"/>
    <circle cx="800" cy="150" r="9" fill="#1976d2" opacity="0.7"/>
    <circle cx="1000" cy="250" r="8" fill="#1976d2" opacity="0.7"/>
    <circle cx="1200" cy="180" r="7" fill="#1976d2" opacity="0.7"/>
    <circle cx="300" cy="250" r="6" fill="#1976d2" opacity="0.7"/>
    <circle cx="500" cy="280" r="8" fill="#1976d2" opacity="0.7"/>
    <circle cx="700" cy="100" r="7" fill="#1976d2" opacity="0.7"/>
    <circle cx="900" cy="300" r="9" fill="#1976d2" opacity="0.7"/>
    <circle cx="1100" cy="200" r="6" fill="#1976d2" opacity="0.7"/>
    <circle cx="400" cy="300" r="7" fill="#1976d2" opacity="0.7"/>
    <circle cx="800" cy="250" r="8" fill="#1976d2" opacity="0.7"/>
  </g>

  <!-- Additional decorative elements -->
  <g opacity="0.3">
    <circle cx="150" cy="80" r="30" fill="none" stroke="#1565c0" stroke-width="1"/>
    <circle cx="1300" cy="250" r="40" fill="none" stroke="#1565c0" stroke-width="1"/>
    <circle cx="650" cy="50" r="25" fill="none" stroke="#1565c0" stroke-width="1"/>
  </g>
</svg>
